<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Wony's Pomo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <div class="card" id="card">
    <button id="settingsBtn" class="settings-btn" aria-label="설정">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>

    <div class="modes" role="tablist">
      <button class="mode-tab active" data-mode="pomodoro" role="tab">Pomodoro</button>
      <button class="mode-tab" data-mode="short" role="tab">Short Break</button>
      <button class="mode-tab" data-mode="long" role="tab">Long Break</button>
    </div>

    <div class="timer-wrap">
      <svg class="ring" viewBox="0 0 200 200" aria-hidden="true">
        <circle class="ring-track" cx="100" cy="100" r="92"></circle>
        <circle id="ringProgress" class="ring-progress" cx="100" cy="100" r="92"></circle>
      </svg>
      <div class="time-display">
        <span id="timeText" class="time-text">25:00</span>
        <span id="modeLabel" class="mode-label">집중할 시간</span>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn" class="start-btn">START</button>
      <button id="resetBtn" class="reset-btn" aria-label="리셋">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
        </svg>
      </button>
      <button id="skipBtn" class="skip-btn" aria-label="다음 모드">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 4 15 12 5 20 5 4"></polygon>
          <line x1="19" y1="5" x2="19" y2="19"></line>
        </svg>
      </button>
    </div>

    <div class="tomato-row" id="tomatoRow"></div>
    <p class="round-text">오늘 완료 <span id="completedCount">0</span> / <span id="totalToday">∞</span> 🍅</p>

    <div id="settingsPanel" class="settings-panel" hidden>
      <div class="setting-row">
        <label for="setPomo">Pomodoro</label>
        <input type="number" id="setPomo" min="1" max="120" value="25" />
        <span class="unit">분</span>
      </div>
      <div class="setting-row">
        <label for="setShort">Short Break</label>
        <input type="number" id="setShort" min="1" max="60" value="5" />
        <span class="unit">분</span>
      </div>
      <div class="setting-row">
        <label for="setLong">Long Break</label>
        <input type="number" id="setLong" min="1" max="60" value="15" />
        <span class="unit">분</span>
      </div>
      <div class="setting-row">
        <label for="setRounds">사이클</label>
        <input type="number" id="setRounds" min="2" max="12" value="4" />
        <span class="unit">회마다 긴 휴식</span>
      </div>
      <div class="setting-row toggle-row">
        <label for="setAuto">자동 시작</label>
        <input type="checkbox" id="setAuto" checked />
      </div>
      <div class="setting-row toggle-row">
        <label for="setSound">알람 소리</label>
        <input type="checkbox" id="setSound" checked />
      </div>
      <button id="closeSettingsBtn" class="close-settings">완료</button>
    </div>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
